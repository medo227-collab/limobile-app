version: '3.8'

services:
  limobile-builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./output:/output
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    command: >
      sh -c "
        echo '🚀 Génération de l'APK LiMobile...' &&
        cd /app &&
        pnpm run build &&
        npx cap sync &&
        cd android &&
        ./gradlew assembleDebug &&
        cp app/build/outputs/apk/debug/app-debug.apk /output/ &&
        echo '✅ APK généré avec succès!' &&
        echo '📍 Localisation: /output/app-debug.apk' &&
        ls -lh /output/
      "
